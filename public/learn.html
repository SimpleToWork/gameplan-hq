<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MerchantsBI · Data Workflow Course</title>
<link rel="icon" type="image/png" href="/mbi-logo.png">
<link rel="apple-touch-icon" href="/mbi-logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap');
  :root{
    --ink:#14171f; --muted:#646b78; --faint:#9aa0a8; --line:#e3e5ea;
    --surface:#ffffff; --canvas:#eef0f2; --accent:#4646c8; --accent-soft:#ecebfb;
    --accent-deep:#34349a; --danger:#c23b3b; --ok:#1d6b45; --ok-soft:#e6f3ec;
    --warn:#9a6b00; --r:14px; --sidebar:266px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;}
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em;color:var(--ink);}
  a{color:var(--accent);text-decoration:none;}
  a:hover{text-decoration:underline;}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.86em;background:#f1f1f6;color:#33337a;padding:1.5px 6px;border-radius:5px;}

  /* ---- top bar ---- */
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:11px 20px;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .topbar img{width:26px;height:26px;border-radius:6px;}
  .topbar .bname{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;}
  .topbar .badge{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:20px;letter-spacing:.02em;}
  .topbar .sp{flex:1;}
  .topbar .pbar{width:150px;height:7px;border-radius:5px;background:var(--line);overflow:hidden;}
  .topbar .pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#6a6ae0);transition:width .4s ease;}
  .topbar .ppct{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:34px;}
  .topbar .home{font-size:13px;color:var(--muted);}

  /* ---- layout ---- */
  .wrap{display:grid;grid-template-columns:var(--sidebar) 1fr;align-items:start;max-width:1240px;margin:0 auto;}
  .side{position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;padding:22px 14px 60px;border-right:1px solid var(--line);}
  .side .stitle{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:0 10px 8px;}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:background .12s,color .12s;}
  .navitem:hover{background:var(--accent-soft);color:var(--ink);}
  .navitem.active{background:var(--accent);color:#fff;}
  .navitem .dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:'Space Grotesk',sans-serif;background:var(--line);color:var(--muted);}
  .navitem.active .dot{background:rgba(255,255,255,.25);color:#fff;}
  .navitem.done .dot{background:var(--ok);color:#fff;}
  .navitem.active.done .dot{background:rgba(255,255,255,.3);}
  .navitem .lbl{flex:1;line-height:1.25;}
  .navitem .chk{font-size:11px;}

  /* ---- main ---- */
  .main{padding:34px 46px 90px;min-width:0;}
  .module{display:none;animation:fade .35s ease;}
  .module.show{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .module h1{font-size:30px;margin:0 0 8px;line-height:1.15;}
  .lede{font-size:16.5px;color:var(--muted);max-width:64ch;margin:0 0 26px;}
  .module h2{font-size:21px;margin:34px 0 10px;}
  .module h3{font-size:16px;margin:22px 0 6px;}
  .module p{max-width:70ch;margin:10px 0;}
  .module ul,.module ol{max-width:68ch;padding-left:22px;}
  .module li{margin:6px 0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin:18px 0;}
  .objectives{background:var(--accent-soft);border:1px solid #d9d8f5;border-radius:var(--r);padding:16px 20px;margin:0 0 24px;}
  .objectives h4{margin:0 0 8px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-deep);}
  .objectives ul{margin:0;padding-left:20px;}
  .objectives li{margin:4px 0;font-size:14.5px;}

  .callout{display:flex;gap:13px;border-radius:12px;padding:14px 16px;margin:18px 0;font-size:14px;border:1px solid;}
  .callout .ic{font-size:17px;flex-shrink:0;line-height:1.4;}
  .callout.term{background:#fbfbfd;border-color:var(--line);}
  .callout.tip{background:var(--ok-soft);border-color:#c4e3d1;}
  .callout.warn{background:#fff6e6;border-color:#f0dca8;}
  .callout b{font-weight:600;}

  table.t{border-collapse:collapse;width:100%;margin:16px 0;font-size:13.5px;}
  table.t th{text-align:left;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--line);padding:8px 10px;}
  table.t td{border-bottom:1px solid var(--line);padding:9px 10px;vertical-align:top;}
  table.t tr:last-child td{border-bottom:none;}
  table.t code{white-space:nowrap;}

  pre{background:#15171f;color:#e7e9f0;border-radius:12px;padding:16px 18px;overflow-x:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.55;margin:16px 0;}
  pre .k{color:#a8c7ff;} pre .s{color:#9ce0b0;} pre .c{color:#7d8597;font-style:italic;} pre .n{color:#e6c07b;}

  /* ---- pipeline diagram ---- */
  .pipe{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch;margin:26px 0;}
  .pstep{flex:1;min-width:104px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 11px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;position:relative;}
  .pstep:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 6px 18px rgba(70,70,200,.12);}
  .pstep .pn{font-size:10px;font-weight:600;color:var(--faint);font-family:'Space Grotesk',sans-serif;}
  .pstep .pt{font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;margin:3px 0 2px;line-height:1.2;}
  .pstep .pd{font-size:11.5px;color:var(--muted);line-height:1.3;}
  .pstep .ar{position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px;z-index:2;}
  .pstep:last-child .ar{display:none;}

  /* ---- quiz ---- */
  .quiz{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;margin:30px 0 10px;}
  .quiz h3{margin:0 0 4px;font-size:17px;}
  .quiz .qsub{font-size:13px;color:var(--muted);margin:0 0 16px;}
  .q{margin:0 0 18px;}
  .q .qtext{font-weight:600;font-size:14.5px;margin-bottom:9px;}
  .q .qtext .qn{color:var(--accent);margin-right:6px;}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:10px 13px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit;color:var(--ink);transition:background .12s,border-color .12s;}
  .opt:hover{border-color:var(--accent);background:var(--accent-soft);}
  .opt.correct{border-color:var(--ok);background:var(--ok-soft);}
  .opt.wrong{border-color:var(--danger);background:#fbeaea;}
  .opt.disabled{cursor:default;pointer-events:none;opacity:.85;}
  .opt .mk{float:right;font-weight:700;}
  .expl{font-size:13px;color:var(--muted);margin:6px 2px 0;padding-left:13px;border-left:2px solid var(--line);display:none;}
  .expl.show{display:block;}
  .qresult{font-size:14px;font-weight:600;margin-top:6px;display:none;}
  .qresult.show{display:block;}

  /* ---- footer nav ---- */
  .pgnav{display:flex;justify-content:space-between;gap:12px;margin-top:42px;padding-top:24px;border-top:1px solid var(--line);}
  .btn{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:14px;border-radius:10px;padding:11px 18px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);transition:background .12s,border-color .12s,transform .08s;}
  .btn:hover{border-color:var(--accent);}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary:hover{background:var(--accent-deep);}
  .btn.ghost{background:none;border-color:transparent;color:var(--muted);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn .a{opacity:.6;font-weight:400;}

  .markdone{display:inline-flex;align-items:center;gap:8px;}
  .donechip{font-size:12.5px;color:var(--ok);font-weight:600;display:none;}
  .donechip.show{display:inline;}

  .tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent-deep);margin:0 6px 6px 0;}

  /* completion banner */
  .finish{text-align:center;padding:40px 20px;}
  .finish .big{font-size:46px;}
  .finish h2{font-size:24px;margin:10px 0 6px;}

  @media(max-width:860px){
    .wrap{grid-template-columns:1fr;}
    .side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line);}
    .main{padding:24px 20px 80px;}
    .topbar .pbar{width:90px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <img src="/mbi-logo.png" alt="MerchantsBI">
  <span class="bname">MerchantsBI</span>
  <span class="badge">Data Workflow Course</span>
  <span class="sp"></span>
  <div class="pbar"><i id="topfill"></i></div>
  <span class="ppct" id="toppct">0%</span>
  <a class="home" href="/">← Board</a>
</div>

<div class="wrap">
  <nav class="side">
    <div class="stitle">Modules</div>
    <div id="nav"></div>
  </nav>

  <main class="main" id="main"><!-- modules injected --></main>
</div>

<script>
/* ============================================================
   MerchantsBI Data Workflow — self-contained learning course.
   Source → connect → sync → ETL → datalake → schedule → deliver.
   Progress + quiz state persist in localStorage. No deps.
   ============================================================ */

const LS_KEY = "mbi_course_progress_v1";
const state = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ---- module content ----------------------------------------------------- */
const MODULES = [
{
  id:"overview", nav:"Big picture", icon:"◎",
  eyebrow:"Module 0 · Orientation",
  title:"The MerchantsBI data journey, end to end",
  lede:"Every customer engagement follows one path: their raw data sources become clean, governed, query-ready data that flows back to them as living dashboards and reports. This course walks that path one stage at a time.",
  obj:[
    "Name the seven stages of the MerchantsBI pipeline in order",
    "Explain what moves between each stage (and in what shape)",
    "Locate where you fit, whoever you are on the team"
  ],
  body:`
    <p>MerchantsBI is a <b>business-intelligence service</b>: customers hand us their scattered operational data — the SaaS tools they bill through, the databases behind their apps, the spreadsheets and file drops — and we hand back a single, trustworthy view of their business. Between those two points sits a repeatable pipeline. Click any stage to jump to its module.</p>

    <div class="pipe" id="pipe"></div>

    <h2>What flows down the pipe</h2>
    <p>The key idea: each stage takes a well-defined input and produces a well-defined output for the next stage. Nothing is improvised hand-off to hand-off.</p>
    <table class="t">
      <tr><th>Stage</th><th>Takes in</th><th>Hands off</th></tr>
      <tr><td><b>Intake</b></td><td>A customer and a wishlist of questions</td><td>A list of described data sources + goals</td></tr>
      <tr><td><b>Source connection</b></td><td>A described source (maybe a URL + credential)</td><td>A structured <i>connector spec</i></td></tr>
      <tr><td><b>Data sync</b></td><td>A connector spec + a schedule</td><td>Raw records landed in the lake</td></tr>
      <tr><td><b>ETL</b></td><td>Raw landed records</td><td>Clean, typed, modeled tables</td></tr>
      <tr><td><b>Datalake</b></td><td>Raw + modeled data</td><td>A governed, queryable store</td></tr>
      <tr><td><b>Scheduling</b></td><td>The jobs above</td><td>Reliable, on-time, monitored runs</td></tr>
      <tr><td><b>Delivery</b></td><td>Modeled data</td><td>Dashboards & reports for the customer</td></tr>
    </table>

    <div class="callout tip"><span class="ic">💡</span><div><b>Why this matters for everyone.</b> Sales promises a deliverable, ETL builds the transforms, Dev-Ops keeps the schedule healthy, and AI agents (like the <i>Master Connector Identifier</i>) automate the connection step. Knowing the whole path means you know whose work yours depends on — and who depends on yours.</div></div>

    <h2>A guiding example</h2>
    <p>We'll carry one example through the whole course: a customer, <b>"Northwind Coffee"</b>, wants a daily dashboard of revenue, refunds, and active subscribers. Their data lives in <b>Stripe</b> (payments, REST API) and an internal <b>Postgres</b> orders database. By the last module you'll have followed both sources from a sentence in a sales call all the way to a number on their screen.</p>
  `,
  quiz:{
    title:"Check yourself", sub:"Three quick questions before you continue.",
    qs:[
      { t:"Which sequence correctly orders the pipeline?",
        opts:["Intake → ETL → Source connection → Delivery","Intake → Source connection → Data sync → ETL → Datalake → Scheduling → Delivery","Source connection → Intake → Delivery → ETL","Datalake → Intake → Delivery"],
        a:1, e:"Intake comes first (understand the need), then we connect, sync, transform, store, schedule, and finally deliver." },
      { t:"What is the single artifact handed from the connection stage to data sync?",
        opts:["A finished dashboard","A raw CSV","A structured connector spec","The customer's password"],
        a:2, e:"The connection stage's whole job is to produce one structured connector spec the ETL/sync layer can consume directly." },
      { t:"The big idea that keeps the pipeline reliable is…",
        opts:["Every stage improvises its hand-off","Each stage has a defined input and a defined output","Customers do the ETL themselves","Nothing is ever scheduled"],
        a:1, e:"Defined inputs and outputs at each boundary are what make the pipeline repeatable and debuggable." }
    ]
  }
},
{
  id:"intake", nav:"Intake & onboarding", icon:"1",
  eyebrow:"Module 1 · Stage one",
  title:"Intake: turning a business question into a data plan",
  lede:"Before a single byte moves, we figure out what the customer actually wants to know and which of their systems holds the answer. Skip this and you build a beautiful pipeline pointed at the wrong data.",
  obj:[
    "Translate vague business goals into concrete data questions",
    "Inventory a customer's data sources and what each can answer",
    "Capture the requirements the rest of the pipeline depends on"
  ],
  body:`
    <h2>What intake produces</h2>
    <p>Intake is a conversation that ends in a written plan. The deliverables a downstream engineer needs from it are:</p>
    <ul>
      <li><b>The questions</b> — e.g. "How much revenue did we make yesterday, net of refunds?" Each one becomes a metric on the eventual dashboard.</li>
      <li><b>The source inventory</b> — every system that might hold the answer, described in plain language, with whoever owns access.</li>
      <li><b>Grain &amp; freshness</b> — how detailed (per-order? per-day?) and how fresh (real-time? once a day?) the answer must be.</li>
      <li><b>Constraints</b> — data that's sensitive, regulated, or off-limits; and any contractual SLAs.</li>
    </ul>

    <div class="callout term"><span class="ic">📖</span><div><b>Source description.</b> A short, natural-language statement of a data source — "Stripe charges and customers", or "our internal Postgres orders DB". This is exactly the input the connector stage expects, so getting it crisp at intake saves a round-trip later.</div></div>

    <h2>Freshness drives everything downstream</h2>
    <p>"How fresh?" is the most expensive question to get wrong, because it sets the <b>sync schedule</b>, the transform strategy, and the cost. A daily dashboard needs a nightly sync; a live ops board may need streaming. Pin it down now.</p>

    <table class="t">
      <tr><th>If the customer says…</th><th>They probably need…</th><th>Which sets…</th></tr>
      <tr><td>"I check it each morning"</td><td>Daily refresh</td><td>A nightly scheduled sync</td></tr>
      <tr><td>"During a sale I watch it live"</td><td>Near-real-time</td><td>Frequent incremental syncs / streaming</td></tr>
      <tr><td>"Monthly board deck"</td><td>Monthly snapshot</td><td>A monthly batch + history retention</td></tr>
    </table>

    <h2>Northwind Coffee, intake edition</h2>
    <div class="card">
      <p style="margin-top:0"><b>Goal:</b> "A dashboard I open every morning showing yesterday's revenue, refunds, and how many active subscribers I have."</p>
      <p><b>Questions →</b> net revenue (daily), refund total &amp; count (daily), active subscriber count (point-in-time).</p>
      <p><b>Sources →</b> Stripe (payments &amp; subscriptions, REST API, has an API key); internal Postgres "orders" DB (for fulfillment context).</p>
      <p style="margin-bottom:0"><b>Freshness →</b> daily, refreshed before 7am local. <b>Grain →</b> per-transaction kept; dashboard rolls up to per-day.</p>
    </div>
    <p>Notice we've now produced exactly what the next stage wants: two crisp source descriptions, each with a hint about how to connect. On to connecting them.</p>
  `,
  quiz:{
    title:"Check yourself", sub:"",
    qs:[
      { t:"Why is 'how fresh does the data need to be?' the most important intake question?",
        opts:["It decides the dashboard's color scheme","It sets the sync schedule, transform strategy, and cost","It's required by law","It has no real impact"],
        a:1, e:"Freshness cascades into the schedule, how transforms run, and the overall cost — getting it wrong is expensive to fix later." },
      { t:"A good intake 'source description' looks like…",
        opts:["'Stripe charges and customers'","'their stuff'","a 40-page contract","the raw database password"],
        a:0, e:"A crisp natural-language description is exactly what the connector stage consumes. Short and specific wins." },
      { t:"Intake's main risk if skipped is…",
        opts:["The logo is wrong","You build a working pipeline pointed at the wrong data","Too many dashboards","Nothing — it's optional"],
        a:1, e:"Without intake you can build something technically perfect that answers a question the customer never asked." }
    ]
  }
},
{
  id:"connect", nav:"Source connections", icon:"2",
  eyebrow:"Module 2 · Stage two",
  title:"Source connections: the connector spec",
  lede:"Every source — a REST API, a database, a file drop, a webhook — is reduced to one structured connector spec the rest of the platform can consume. At MerchantsBI an AI agent, the Master Connector Identifier, does the heavy lifting.",
  obj:[
    "List the connection methods and pick the right one for a source",
    "Recognize the common authentication and pagination patterns",
    "Read and trust (or question) a connector spec"
  ],
  body:`
    <h2>The job: figure out how to talk to a source</h2>
    <p>A source could be almost anything. The connection stage classifies it, discovers how to authenticate, infers its schema, learns how it paginates and rate-limits, and emits <b>one structured connector spec</b>. That spec is the contract the sync + ETL layers build on.</p>

    <h3>Connection methods</h3>
    <table class="t">
      <tr><th>Method</th><th>Looks like</th><th>Can we probe it live?</th></tr>
      <tr><td><code>REST</code></td><td>HTTP+JSON SaaS APIs (Stripe, Shopify)</td><td>Yes — public HTTPS</td></tr>
      <tr><td><code>GraphQL</code></td><td>A single <code>/graphql</code> endpoint</td><td>Yes — public HTTPS</td></tr>
      <tr><td><code>JDBC</code></td><td>Relational DBs (Postgres, MySQL)</td><td>Usually no — private network</td></tr>
      <tr><td><code>SDK</code></td><td>Vendor library, no plain HTTP</td><td>No — infer</td></tr>
      <tr><td><code>file</code></td><td>CSV/Parquet in S3, an SFTP drop</td><td>No — infer from a sample</td></tr>
      <tr><td><code>webhook</code></td><td>The source pushes events to us</td><td>No — inbound</td></tr>
    </table>

    <div class="callout warn"><span class="ic">⚠️</span><div><b>Probing has limits.</b> The platform can only live-probe <b>public</b> HTTP(S) endpoints — an SSRF guard blocks private/internal addresses. So REST/GraphQL specs are <b>high-confidence</b> (we saw the real responses); JDBC/file/SDK/webhook specs are <b>inferred</b> and must be verified against the real source before wiring the job.</div></div>

    <h3>Authentication patterns to recognize</h3>
    <p>None/public · API key (header <i>or</i> query param) · Bearer token · HTTP Basic · OAuth2 (client-credentials or authorization-code) · HMAC-signed requests · mTLS. The spec records the <i>type</i> plus the specifics (header name, token URL, scopes, signing algorithm).</p>

    <h3>Pagination styles to recognize</h3>
    <p><code>cursor</code> (next/next_cursor token) · <code>page</code> (page number + size) · <code>offset</code> (offset + limit) · <code>link-header</code> (RFC&nbsp;5988 <code>rel="next"</code>) · <code>keyset</code>/seek · <code>none</code>. Getting this right is what lets sync pull <i>all</i> the records, not just the first page.</p>

    <h2>The connector spec (the output contract)</h2>
    <p>Here's the shape of what this stage emits for Northwind's Stripe source:</p>
    <pre><span class="c">// connector spec — consumed directly by the ETL layer</span>
{
  <span class="k">"connectionMethod"</span>: <span class="s">"REST"</span>,
  <span class="k">"endpoint"</span>: <span class="s">"https://api.stripe.com/v1"</span>,
  <span class="k">"authentication"</span>: { <span class="k">"type"</span>:<span class="s">"Bearer"</span>, <span class="k">"details"</span>:<span class="s">"secret key in Authorization header"</span> },
  <span class="k">"schema"</span>: [
    { <span class="k">"field"</span>:<span class="s">"id"</span>,       <span class="k">"type"</span>:<span class="s">"string"</span> },
    { <span class="k">"field"</span>:<span class="s">"amount"</span>,   <span class="k">"type"</span>:<span class="s">"integer"</span> },   <span class="c">// cents</span>
    { <span class="k">"field"</span>:<span class="s">"created"</span>,  <span class="k">"type"</span>:<span class="s">"timestamp"</span> }, <span class="c">// unix epoch</span>
    { <span class="k">"field"</span>:<span class="s">"refunded"</span>, <span class="k">"type"</span>:<span class="s">"boolean"</span> }
  ],
  <span class="k">"pagination"</span>: { <span class="k">"style"</span>:<span class="s">"cursor"</span>, <span class="k">"details"</span>:<span class="s">"starting_after=&lt;id&gt;, has_more flag"</span> },

    <h2>Full refresh vs. incremental</h2>
    <table class="t">
      <tr><th></th><th>Full refresh</th><th>Incremental</th></tr>
      <tr><td><b>What it does</b></td><td>Re-pulls every record every run</td><td>Pulls only what changed since last run</td></tr>
      <tr><td><b>Needs</b></td><td>Nothing special</td><td>A reliable cursor: <code>updated_at</code>, an ID, or a source cursor</td></tr>

/* ---- render ------------------------------------------------------------- */
const main = document.getElementById("main");
const nav  = document.getElementById("nav");

function isDone(id){ return !!(state[id] && state[id].done); }

function buildPipe(){
  const steps = MODULES.filter(m=>m.id!=="overview");
  const el = document.getElementById("pipe");
  if(!el) return;
  el.innerHTML = steps.map((m,i)=>`
    <div class="pstep" data-go="${m.id}">
      <div class="pn">Stage ${i+1}</div>
      <div class="pt">${m.nav}</div>
      <div class="pd">${stepBlurb(m.id)}</div>
      <span class="ar">→</span>
    </div>`).join("");
  el.querySelectorAll(".pstep").forEach(s=>s.onclick=()=>go(s.dataset.go));
}
function stepBlurb(id){
  return ({intake:"Understand the need",connect:"Build the connector spec",sync:"Pull raw records",
    etl:"Clean & model",lake:"Store & govern",schedule:"Run reliably",deliver:"Back to the customer"})[id]||"";
}

function renderModule(m, idx){
  const sec = document.createElement("section");
  sec.className = "module"; sec.id = "m-"+m.id;
  const quizHtml = m.quiz ? `

      <h3>${m.quiz.title}</h3>

        <div class="q" data-qi="${qi}">
          <div class="qtext"><span class="qn">Q${qi+1}.</span>${q.t}</div>
          ${q.opts.map((o,oi)=>`<button class="opt" data-oi="${oi}">${o}<span class="mk"></span></button>`).join("")}
          <div class="expl">${q.e}</div>
        </div>`).join("")}
      <div class="qresult"></div>
    </div>` : "";

  sec.innerHTML = `
    <div class="eyebrow">${m.eyebrow}</div>
    <h1>${m.title}</h1>
    <p class="lede">${m.lede}</p>
    <div class="objectives">
      <h4>By the end of this module you'll be able to</h4>

        <span class="donechip" data-chip>✓ Completed</span>
        <button class="btn primary" data-done>${idx<MODULES.length-1?"Mark complete & continue →":"Mark complete →"}</button>
      </span>
    </div>`;
  main.appendChild(sec);

  // wire quiz
  if(m.quiz) wireQuiz(sec, m);
  // wire nav buttons
  sec.querySelector("[data-done]").onclick = ()=>{ markDone(m.id); if(idx<MODULES.length-1) go(MODULES[idx+1].id); else go("done"); };
  const pv = sec.querySelector("[data-prev]");
  if(idx>0) pv.onclick = ()=>go(MODULES[idx-1].id); else pv.style.visibility="hidden";
  refreshDoneChip(sec, m.id);
}

function wireQuiz(sec, m){
  const qstate = (state[m.id] && state[m.id].quiz) || {};
  sec.querySelectorAll(".q").forEach(qEl=>{
    const qi = +qEl.dataset.qi, q = m.quiz.qs[qi];
    const opts = [...qEl.querySelectorAll(".opt")];
    const expl = qEl.querySelector(".expl");
    function lockIn(chosen){
      opts.forEach((o,oi)=>{
        o.classList.add("disabled");
        if(oi===q.a){ o.classList.add("correct"); o.querySelector(".mk").textContent="✓"; }
        else if(oi===chosen){ o.classList.add("wrong"); o.querySelector(".mk").textContent="✗"; }
      });
      expl.classList.add("show");
    }
    opts.forEach(o=>o.onclick=()=>{
      const chosen = +o.dataset.oi;
      qstate[qi] = chosen;
      state[m.id] = state[m.id]||{}; state[m.id].quiz = qstate; save();
      lockIn(chosen); tallyQuiz(sec, m);
    });
    if(qstate[qi]!=null) lockIn(qstate[qi]);
  });
  tallyQuiz(sec, m);
}
function tallyQuiz(sec, m){
  const qstate = (state[m.id] && state[m.id].quiz) || {};
  const answered = m.quiz.qs.filter((q,i)=>qstate[i]!=null).length;
  const correct  = m.quiz.qs.filter((q,i)=>qstate[i]===q.a).length;
  const res = sec.querySelector(".qresult");
  if(answered===m.quiz.qs.length){
    res.classList.add("show");
    res.style.color = correct===answered ? "var(--ok)" : "var(--muted)";
    res.textContent = `You got ${correct} of ${answered} right.` + (correct===answered? " Nicely done — you've got this stage." : " Review the explanations above, then mark complete.");
  } else { res.classList.remove("show"); }
}

function buildNav(){
  nav.innerHTML = MODULES.map((m,i)=>`
    <button class="navitem" data-go="${m.id}" id="nav-${m.id}">
      <span class="dot">${m.icon}</span>
      <span class="lbl">${m.nav}</span>
      <span class="chk"></span>
    </button>`).join("");
  nav.querySelectorAll(".navitem").forEach(b=>b.onclick=()=>go(b.dataset.go));
}

let current = null;
function go(id){
  if(id==="done"){ showFinish(); return; }
  const m = MODULES.find(x=>x.id===id); if(!m) return;
  current = id;
  document.querySelectorAll(".module").forEach(s=>s.classList.remove("show"));
  const sec = document.getElementById("m-"+id); if(sec) sec.classList.add("show");
  // nav highlight
  document.querySelectorAll(".navitem").forEach(n=>n.classList.toggle("active", n.dataset.go===id));
  window.scrollTo({top:0, behavior:"smooth"});
  if(id==="overview") buildPipe();
  location.hash = id;
  state.last = id; save();
}

function markDone(id){
  state[id] = state[id]||{}; state[id].done = true; save();
  syncProgress();
}
function refreshDoneChip(sec, id){
  const chip = sec.querySelector("[data-chip]");
  const btn  = sec.querySelector("[data-done]");
  if(isDone(id)){ chip.classList.add("show"); }
}

function syncProgress(){
  const total = MODULES.length;
  const done  = MODULES.filter(m=>isDone(m.id)).length;
  const pct = Math.round(done/total*100);
  document.getElementById("topfill").style.width = pct+"%";
  document.getElementById("toppct").textContent = pct+"%";
  MODULES.forEach(m=>{
    const n = document.getElementById("nav-"+m.id);
    if(!n) return;
    n.classList.toggle("done", isDone(m.id));
    n.querySelector(".chk").textContent = isDone(m.id) ? "✓" : "";
    if(isDone(m.id)) n.querySelector(".dot").textContent = "✓"; else n.querySelector(".dot").textContent = m.icon;
  });
  // refresh visible chips
  MODULES.forEach(m=>{
    const sec = document.getElementById("m-"+m.id);
    if(sec){ const chip=sec.querySelector("[data-chip]"); if(chip) chip.classList.toggle("show", isDone(m.id)); }
  });
}

function showFinish(){
  document.querySelectorAll(".module").forEach(s=>s.classList.remove("show"));
  document.querySelectorAll(".navitem").forEach(n=>n.classList.remove("active"));
  let f = document.getElementById("m-finish");
  if(!f){
    f = document.createElement("section");
    f.className="module"; f.id="m-finish";
    f.innerHTML = `
      <div class="finish">
        <div class="big">🎓</div>
        <h2>You've followed the data all the way home.</h2>
        <p class="lede" style="margin:0 auto 22px;">Source → connect → sync → ETL → datalake → schedule → deliver. You can now trace any MerchantsBI dashboard number back through every stage that produced it.</p>
        <button class="btn primary" onclick="go('overview')">Revisit the big picture</button>
        <button class="btn" onclick="resetCourse()">Reset progress</button>
      </div>`;
    main.appendChild(f);
  }
  f.classList.add("show");
  window.scrollTo({top:0,behavior:"smooth"});
  location.hash = "done";
}
function resetCourse(){
  if(!confirm("Reset all course progress and quiz answers?")) return;
  for(const k of Object.keys(state)) delete state[k];
  save(); location.reload();
}
window.go = go; window.resetCourse = resetCourse;

/* ---- boot --------------------------------------------------------------- */
buildNav();
MODULES.forEach((m,i)=>renderModule(m,i));
syncProgress();
const start = (location.hash||"").replace("#","") || state.last || "overview";
go(MODULES.find(m=>m.id===start) ? start : "overview");
</script>
</body>
</html>
