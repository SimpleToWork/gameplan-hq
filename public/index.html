    const keys=[];roster().forEach(mm=>{if(items.some(t=>ka(t).toLowerCase()===mm.name.toLowerCase()))keys.push(mm.name);});
    if(items.some(t=>ka(t)==="Unassigned"))keys.push("Unassigned");

// ---- Resizable table columns (shared by the Tasks/Roadmap/Agenda tables) ----
// Widths persist per table in localStorage (gp_colw_<key>) and re-apply on every render — required because these
// tables are rebuilt from scratch on each render. The table stays table-layout:auto (content-sized) until the first
// drag, at which point the current column widths are frozen to px and the layout switches to fixed, so the default
// look is preserved and the user takes over from there. Double-clicking a grip clears that column (lets it re-flex).
const colwStoreKey=key=>"gp_colw_"+key;

function syncColW(key,cols){const widths=cols.map(c=>c.style.width||"");document.querySelectorAll('table[data-colw-key="'+key+'"]').forEach(tb=>{const cg=tb.querySelector("colgroup");if(!cg)return;tb.style.tableLayout="fixed";Array.from(cg.children).forEach((c,i)=>{c.style.width=widths[i]||"";});});}
function makeColumnsResizable(table,key){
  const headRow=table.tHead&&table.tHead.rows[0];if(!headRow)return;
  const ths=Array.from(headRow.cells);const n=ths.length;if(n<2)return;
  table.dataset.colwKey=key;

  const cols=Array.from(cg.children);
  const MIN=48;

  // collapses toward zero once its neighbours are widened — its nowrap content (e.g. the Tasks "ID" cell) then spills
  // past the table's right edge with no header background, looking like it sits outside the table. The floor keeps it
  // a proper, content-sized column. (Legacy saved widths always left this entry null, so apply it there too.)
  const TRAIL_MIN=100;
  const saved=loadColW(key,n);
  if(saved){table.style.tableLayout="fixed";cols.forEach((c,i)=>{if(saved[i]!=null)c.style.width=saved[i]+"px";});
    if(saved[n-1]==null)cols[n-1].style.width=TRAIL_MIN+"px";}
  // Grip on every header but the last — the trailing column isn't directly draggable but is pinned (above / on first
  // drag) so it never flexes to zero.
  ths.forEach((th,i)=>{
    if(i===n-1)return;
    const grip=document.createElement("div");grip.className="col-resizer";grip.title="Drag to resize · double-click to reset";

      try{grip.setPointerCapture(e.pointerId);}catch(_){}

      const up=()=>{grip.removeEventListener("pointermove",move);grip.removeEventListener("pointerup",up);grip.removeEventListener("pointercancel",up);grip.classList.remove("dragging");document.body.classList.remove("col-resizing");saveColW(key,cols);syncColW(key,cols);};
      grip.addEventListener("pointermove",move);grip.addEventListener("pointerup",up);grip.addEventListener("pointercancel",up);
    });
    grip.addEventListener("dblclick",e=>{e.preventDefault();e.stopPropagation();cols[i].style.width="";saveColW(key,cols);syncColW(key,cols);});
    th.appendChild(grip);
  });

function taskTextMatch(t,q){

// Sticky horizontal scrollbar for table view — mirrors the active .tasktable-wrap scroll at the viewport bottom.
// Re-called on every renderTasks; cleans up previous listeners via AbortController stored on the bar element.
function setupStickyHScroll(){
  let bar=document.getElementById("tt-sticky-bar");
  if(!bar){bar=document.createElement("div");bar.id="tt-sticky-bar";bar.appendChild(document.createElement("div"));document.body.appendChild(bar);}
  // Abort previous listener set so stale wraps don't leak.
  if(bar._ac){bar._ac.abort();}
  bar._ac=new AbortController();const sig={signal:bar._ac.signal};
  const inner=bar.firstChild;
  const wraps=Array.from(document.querySelectorAll(".tasktable-wrap"));
  if(!wraps.length){bar.style.display="none";return;}
  let activeWrap=null,syncing=false;
  const getBest=()=>{
    let best=null,bestVis=0;const vh=window.innerHeight;
    wraps.forEach(w=>{const r=w.getBoundingClientRect();const vis=Math.max(0,Math.min(vh,r.bottom)-Math.max(0,r.top));if(vis>bestVis){bestVis=vis;best=w;}});
    return best;
  };
  const update=()=>{
    const w=getBest();if(!w){bar.style.display="none";return;}
    if(w!==activeWrap){activeWrap=w;}
    if(activeWrap.scrollWidth<=activeWrap.clientWidth+1){bar.style.display="none";return;}
    const rect=activeWrap.getBoundingClientRect();
    const vh=window.innerHeight;
    // Hide when the table's bottom edge (native scrollbar) is already in view
    if(rect.bottom<=vh){bar.style.display="none";return;}
    inner.style.width=activeWrap.scrollWidth+"px";
    // Align the sticky bar exactly over the table (not the full viewport width)
    bar.style.left=rect.left+"px";
    bar.style.width=rect.width+"px";
    bar.style.display="block";
    if(!syncing)bar.scrollLeft=activeWrap.scrollLeft;
  };
  bar.addEventListener("scroll",()=>{if(!activeWrap||syncing)return;syncing=true;activeWrap.scrollLeft=bar.scrollLeft;requestAnimationFrame(()=>{syncing=false;});},sig);
  wraps.forEach(w=>w.addEventListener("scroll",()=>{if(syncing||w!==activeWrap)return;syncing=true;bar.scrollLeft=w.scrollLeft;requestAnimationFrame(()=>{syncing=false;});},sig));
  window.addEventListener("scroll",update,{passive:true,...sig});
  window.addEventListener("resize",update,{passive:true,...sig});
  requestAnimationFrame(update);
}

const taskStatusColor=s=>(ST_COLOR[s]&&ST_COLOR[s][1])||"#888";

// target's linked (non-trashed) tasks. Returns:
//   null  → single-colour mode (Category/Phase/Person colour the target itself; use rmBarColor)
//   []    → multi-colour mode but the target has no linked tasks (render a neutral bar)
//   [...] → ordered {color,weight,label} segments; widths are proportional to weight
function rmBarSegments(r){
  if(rmColorBy!=="tasks"&&rmColorBy!=="tstatus"&&rmColorBy!=="tcat")return null;
  const tasks=DB.tasks.filter(t=>t.roadmapId===r.id&&!t.trashed);

  if(rmColorBy==="tstatus") // grouped by task status, in STATUSES order
    return STATUSES.filter(s=>tasks.some(t=>t.status===s)).map(s=>{const n=tasks.filter(t=>t.status===s).length;return {color:taskStatusColor(s),weight:n,label:s+" ("+n+")"};});

// Group targets by status — one bucket per present status, in STATUSES order, coloured from ST_COLOR. {name,color,items}.
function rmStatusGroups(targets){

// Group targets by phase (the roadmap's time-frame dimension) — one bucket per present phase, plus a "No phase"
// bucket for targets whose phase is unset or no longer a defined phase. {name,color,items}.
function rmPhaseGroups(targets){
  const names=phaseNames();

    .map(p=>({name:p,color:phaseColor(p),items:targets.filter(r=>phaseOf(r)===p)}));

}

// empty dates/strings sort to the end
function cmpDateAsc(a,b){if(!a&&!b)return 0;if(!a)return 1;if(!b)return -1;return a<b?-1:a>b?1:0;}
function sortManual(items){return items.slice().sort((a,b)=>((a.order??1e9)-(b.order??1e9))||cmpDateAsc(a.createdAt,b.createdAt));}
function sortTargets(items){
  if(rmSort==="start")return items.slice().sort((a,b)=>cmpDateAsc(a.start,b.start));
  if(rmSort==="target")return items.slice().sort((a,b)=>cmpDateAsc(a.target,b.target));
  if(rmSort==="added")return items.slice().sort((a,b)=>cmpDateAsc(a.createdAt,b.createdAt));
  if(rmSort==="az")return items.slice().sort((a,b)=>(a.title||"").localeCompare(b.title||""));
  if(rmSort==="za")return items.slice().sort((a,b)=>(b.title||"").localeCompare(a.title||""));
  return sortManual(items);
}
function sortTableTargets(items){
  const {col,dir}=rmTableColSort;const d=dir==="asc"?1:-1;
  return items.slice().sort((a,b)=>{
    if(col==="start")return d*cmpDateAsc(a.start,b.start);
    if(col==="target")return d*cmpDateAsc(a.target,b.target);
    const av=(col==="area"?a.area:col==="title"?a.title:col==="phase"?phaseOf(a):col==="asg"?(a.assignees&&a.assignees[0])||"":"")||"";
    const bv=(col==="area"?b.area:col==="title"?b.title:col==="phase"?phaseOf(b):col==="asg"?(b.assignees&&b.assignees[0])||"":"")||"";
    return d*av.localeCompare(bv);
  });
}
// Drag-and-drop reorder within a manual-sorted sibling group: move dragged before/after the drop target, then renumber.
async function reorderTarget(draggedId,targetId,before,group){
  if(draggedId===targetId)return;
  const dragged=group.find(x=>x.id===draggedId);if(!dragged)return;
  const arr=sortManual(group).filter(x=>x.id!==draggedId);
  let idx=arr.findIndex(x=>x.id===targetId);
  if(idx<0)idx=arr.length;else if(!before)idx++;
  arr.splice(idx,0,dragged);
  // Renumber in a single batched write so the listener fires once (one re-render, not one per card).
  try{
    if(!fbReady)throw new Error("Firebase not configured");
    const batch=writeBatch(db);let changed=0;
    arr.forEach((x,k)=>{if((x.order??null)!==k){batch.update(doc(db,"roadmap",x.id),{order:k});changed++;}});
    if(changed)await batch.commit();
  }catch(e){banner(e.message,"err");}
}

// Build a one-line manager row: [label] [‹] [scrollable items] [›] [add controls]. Arrows scroll the
// item region and hide themselves when there's nothing to scroll. Returns the pieces to fill in.
function rmScrollRow(labelClass,labelText){
  const row=document.createElement("div");row.className="rmrow";
  const label=document.createElement("span");label.className=labelClass;label.textContent=labelText;
  const left=document.createElement("button");left.type="button";left.className="rmscroll-arrow";left.tabIndex=-1;left.setAttribute("aria-label","Scroll left");left.textContent="‹";
  const scroll=document.createElement("div");scroll.className="rmrow-scroll";
  const right=document.createElement("button");right.type="button";right.className="rmscroll-arrow";right.tabIndex=-1;right.setAttribute("aria-label","Scroll right");right.textContent="›";
  const add=document.createElement("div");add.className="rmrow-add";
  row.append(label,left,scroll,right,add);
  const upd=()=>{
    const max=scroll.scrollWidth-scroll.clientWidth,sc=scroll.scrollLeft,has=max>2;
    // keep the arrows' space reserved (visibility, not display) so the add controls stay column-aligned across rows
    left.style.visibility=has?"visible":"hidden";right.style.visibility=has?"visible":"hidden";
    left.disabled=sc<=1;right.disabled=sc>=max-1;
  };
  const step=()=>Math.max(scroll.clientWidth*0.75,160);
  left.onclick=()=>scroll.scrollBy({left:-step(),behavior:"smooth"});
  right.onclick=()=>scroll.scrollBy({left:step(),behavior:"smooth"});
  scroll.addEventListener("scroll",upd);
  row._updArrows=upd;
  return{row,scroll,add};
}

  const ac=areaColor(r.area);const pn=phaseOf(r);
  return '<div class="pt-title"><span class="pt-swatch" style="background:'+ac+'"></span>'+esc(r.title)+'</div>'+
    (r.detail?'<div class="pt-detail">'+esc(r.detail)+'</div>':'')+
    '<div class="pt-meta"><span class="pt-chip">'+esc(r.area)+'</span><span class="pt-chip">'+esc(pn||"—")+'</span>'+
    '<span class="pt-chip">'+(r.start?esc(r.start)+" → ":"by ")+esc(r.target)+'</span>'+
    (linked.length?'<span class="pt-chip">'+done+'/'+linked.length+' tasks done</span>':'<span class="pt-chip">no linked tasks</span>')+'</div>';
}
// The lane items whose dots sit near the cursor x, sorted left→right. Shared by hover and click so a
// click opens exactly the segment the tooltip showed. Falls back to the single closest dot when nothing's in reach.
function nearItems(laneItems,track,e){
  const rect=track.getBoundingClientRect();
  const px=(e.clientX-rect.left)/rect.width*100;
  const thr=Math.max(22/rect.width*100,2.5);   // ~22px reach, but at least 2.5% on narrow tracks
  let near=laneItems.filter(it=>Math.abs(it.tx-px)<=thr);
  if(!near.length){                              // nothing within reach: snap to the single closest dot
    let best=null,bd=Infinity;laneItems.forEach(it=>{const d=Math.abs(it.tx-px);if(d<bd){bd=d;best=it;}});
    if(best&&bd<=thr*2.5)near=[best];
  }
  return near.sort((a,b)=>a.tx-b.tx);
}
// Show the targets in a lane whose dots sit near the cursor; highlight those dots.
function showLaneTip(label,color,laneItems,track,e){
  const near=nearItems(laneItems,track,e);
  laneItems.forEach(it=>it.dot.classList.toggle("near",near.includes(it)));
  if(!near.length){hidePlotTip();return;}
  const t=plotTipEl();
  if(near.length===1){t.innerHTML=singleTipHTML(near[0].r);}
  else{
    near.sort((a,b)=>a.tx-b.tx);
    t.innerHTML='<div class="pt-title"><span class="pt-swatch" style="background:'+color+'"></span>'+esc(label)+'</div>'+
      '<div class="pt-count">'+near.length+' targets near here</div><div class="pt-list">'+
      near.map(it=>{const r=it.r;const linked=DB.tasks.filter(x=>x.roadmapId===r.id&&!x.trashed);const done=linked.filter(x=>x.status==="Done").length;
        return '<div class="pt-row"><span class="pt-pdot" style="background:'+phaseColor(phaseOf(r))+'"></span>'+
          '<span class="pt-name">'+esc(r.title)+'</span>'+
          '<span class="pt-when">'+esc(r.target)+(linked.length?" · "+done+"/"+linked.length:"")+'</span></div>';
      }).join('')+'</div>';
  }
  t.style.display="block";movePlotTip(e);
}
function movePlotTip(e){const t=document.getElementById("plotTip");if(!t||t.style.display==="none")return;const pad=14;const w=t.offsetWidth,h=t.offsetHeight;let x=e.clientX+pad,y=e.clientY+pad;if(x+w>window.innerWidth-8)x=e.clientX-w-pad;if(y+h>window.innerHeight-8)y=e.clientY-h-pad;t.style.left=Math.max(8,x)+"px";t.style.top=Math.max(8,y)+"px";}
function hidePlotTip(){const t=document.getElementById("plotTip");if(t)t.style.display="none";}
// Scatter plot: horizontal time axis (by target/deadline date), one lane per area. A faint whisker shows start→target when a start date exists. Basic first pass.
function renderPlot(m){
  hidePlotTip();
  const tb=document.createElement("div");tb.className="views";tb.style.margin="0 0 12px";
  [["area","By area"],["person","By person"]].forEach(([k,lbl])=>{const b=document.createElement("button");b.textContent=lbl;if(rmPlotMode===k)b.classList.add("on");b.onclick=()=>{rmPlotMode=k;renderRoadmap();};tb.appendChild(b);});
  m.appendChild(tb);
  const dated=rmFilteredTargets().filter(r=>r.target);
  if(!dated.length){m.insertAdjacentHTML("beforeend",'<div class="empty"><div class="big">No dated targets</div>Add a target date to a target to plot it here.</div>');return;}
  const toMs=s=>Date.parse(s+"T00:00:00");
  let min=Infinity,max=-Infinity;
  dated.forEach(r=>{const t=toMs(r.target);min=Math.min(min,t);max=Math.max(max,t);if(r.start)min=Math.min(min,toMs(r.start));});
  const pad=Math.max((max-min)*0.05,86400000*3);min-=pad;max+=pad;
  const span=Math.max(max-min,86400000);
  const fmt=ms=>new Date(ms).toISOString().slice(0,7);
  // lanes are areas or people depending on the mode; dot color always reflects the area.
  let lanes;
  if(rmPlotMode==="person")lanes=groupByPerson(dated).map(g=>({label:g.name,color:g.color,items:g.items}));
  else lanes=rmShown().map(area=>({label:area,color:areaColor(area),items:dated.filter(r=>r.area===area)})).filter(L=>L.items.length);
  if(!lanes.length){m.insertAdjacentHTML("beforeend",'<div class="empty"><div class="big">No assigned dated targets</div>Assign people to dated targets to plot them by person.</div>');return;}
  const plot=document.createElement("div");plot.className="plot";
  const axis=document.createElement("div");axis.className="plot-axis";axis.innerHTML='<span>'+fmt(min)+'</span><span>'+fmt(min+span/4)+'</span><span>'+fmt(min+span/2)+'</span><span>'+fmt(min+span*3/4)+'</span><span>'+fmt(max)+'</span>';plot.appendChild(axis);
  lanes.forEach(L=>{
    const lane=document.createElement("div");lane.className="plot-lane";
    const lbl=document.createElement("div");lbl.className="plot-lane-label";lbl.textContent=L.label;lbl.title=L.label+" ("+L.items.length+")";lbl.style.color=L.color;
    const track=document.createElement("div");track.className="plot-track";
    const laneItems=[];
    L.items.forEach(r=>{
      const ac=areaColor(r.area);
      const tx=(toMs(r.target)-min)/span*100;
      if(r.start){const sx=(toMs(r.start)-min)/span*100;const w=document.createElement("div");w.className="plot-whisker";w.style.cssText="left:"+Math.min(sx,tx)+"%;width:"+Math.abs(tx-sx)+"%;background:"+ac+";";track.appendChild(w);}
      const dot=document.createElement("div");dot.className="plot-dot";dot.style.cssText="left:"+tx+"%;background:"+ac+";cursor:pointer;";
      track.appendChild(dot);
      laneItems.push({r,tx,dot});
    });
    track.addEventListener("mousemove",e=>showLaneTip(L.label,L.color,laneItems,track,e));
    track.addEventListener("mouseleave",()=>{hidePlotTip();laneItems.forEach(it=>it.dot.classList.remove("near"));});
    // Click resolves the cluster at the cursor (same logic as the hover tooltip): one target → its editor,
    // several → a picker so every overlapping target in the segment stays reachable.
    track.addEventListener("click",e=>{const near=nearItems(laneItems,track,e);if(!near.length)return;
      if(near.length===1)openRoadmapModal(near[0].r);else openRoadmapClusterModal(near.map(it=>it.r),L.label,L.color);});
    lane.append(lbl,track);plot.appendChild(lane);
  });
  m.appendChild(plot);
  m.insertAdjacentHTML("beforeend",'<div class="cmeta" style="margin-top:10px;">Each dot is a target at its deadline; lanes are '+(rmPlotMode==="person"?"people":"areas")+', time runs left → right. Dot color = area; the faint bar shows start → target. Hover anywhere along a lane to see the targets near the cursor.</div>');
}
// Drag the seam between the title column and the track to resize all timeline frames live.
function startTlResize(e){
  e.preventDefault();
  const handle=e.currentTarget;handle.classList.add("dragging");
  const startX=e.clientX,startW=rmTlLabelW;
  const prevCursor=document.body.style.cursor,prevSel=document.body.style.userSelect;
  document.body.style.cursor="col-resize";document.body.style.userSelect="none";
  const move=ev=>{
    rmTlLabelW=Math.max(110,Math.min(900,Math.round(startW+(ev.clientX-startX))));
    document.querySelectorAll(".timeline").forEach(t=>t.style.setProperty("--tlw",rmTlLabelW+"px"));
  };
  const up=()=>{
    document.removeEventListener("mousemove",move);document.removeEventListener("mouseup",up);
    handle.classList.remove("dragging");document.body.style.cursor=prevCursor;document.body.style.userSelect=prevSel;
  };
  document.addEventListener("mousemove",move);document.addEventListener("mouseup",up);
}
// Build one timeline frame for a set of targets. Driven by the target (deadline) date; start optional (marker at deadline). Scale is local to the passed set.
function appendTimeline(m,targets,compactEmpty){
  const toMs=s=>Date.parse(s+"T00:00:00");
  const eff=r=>(r.start&&toMs(r.start)<=toMs(r.target))?r.start:r.target;
  const dated=targets.filter(r=>r.target);
  const undated=targets.filter(r=>!r.target);
  if(!dated.length){
    if(compactEmpty)m.insertAdjacentHTML("beforeend",'<div class="cmeta" style="margin:0 0 10px;">No dated targets.</div>');
    else m.insertAdjacentHTML("beforeend",'<div class="empty"><div class="big">No dated targets</div>Add a target date to a target to plot it here.</div>');
  }else{
    let min=Infinity,max=-Infinity;
    dated.forEach(r=>{min=Math.min(min,toMs(eff(r)));max=Math.max(max,toMs(r.target));});
    const span=Math.max(max-min,86400000);
    const fmt=ms=>new Date(ms).toISOString().slice(0,7);
    const tl=document.createElement("div");tl.className="timeline";tl.style.setProperty("--tlw",rmTlLabelW+"px");
    const axis=document.createElement("div");axis.className="tl-axis";axis.innerHTML='<span>'+fmt(min)+'</span><span>'+fmt(min+span/2)+'</span><span>'+fmt(max)+'</span>';tl.appendChild(axis);
    dated.slice().sort((a,b)=>toMs(a.target)-toMs(b.target)).forEach(r=>{
      const ac=rmBarColor(r);
      const s=eff(r);
      const left=(toMs(s)-min)/span*100;
      const width=Math.max((toMs(r.target)-toMs(s))/span*100,1.5);
      const linked=DB.tasks.filter(t=>t.roadmapId===r.id&&!t.trashed);const done=linked.filter(t=>t.status==="Done").length;
      const row=document.createElement("div");row.className="tl-row";
      const lbl=document.createElement("div");lbl.className="tl-label";lbl.textContent=r.title;lbl.title=r.title+" ("+r.area+")";
      const handle=document.createElement("div");handle.className="tl-handle";handle.title="Drag to widen the title column";handle.addEventListener("mousedown",startTlResize);
      const track=document.createElement("div");track.className="tl-track";
      const bar=document.createElement("div");bar.className="tl-bar";bar.style.cssText="left:"+left+"%;width:"+width+"%;background:"+rmBarBackground(rmBarSegments(r),ac)+";cursor:pointer;";bar.addEventListener("click",()=>openRoadmapModal(r));
      const span2=r.start?(r.start+" → "+r.target):("by "+r.target);
      bar.textContent=span2+(linked.length?"  ("+done+"/"+linked.length+")":"");
      // Same rich hover card as the Plot view, plus the multi-colour segment legend when a task-based Colour-by is active.
      bar.addEventListener("mouseenter",e=>{const t=plotTipEl();t.innerHTML=singleTipHTML(r)+rmBarBreakdownHTML(r);t.style.display="block";movePlotTip(e);});
      bar.addEventListener("mousemove",movePlotTip);
      bar.addEventListener("mouseleave",hidePlotTip);
      track.appendChild(bar);row.append(lbl,handle,track);tl.appendChild(row);
    });
    m.appendChild(tl);
  }
  if(undated.length){const d=document.createElement("div");d.className="cmeta";d.style.margin="8px 0 4px";d.textContent="No target date ("+undated.length+"): "+undated.map(r=>r.title).join(", ");m.appendChild(d);}
}

function renderTimeline(m){
  if(rmTlMode==="area"){
    rmShown().forEach(area=>{
      const av=DB.areas.find(a=>a.name===area)||{color:"#888"};
      const items=DB.roadmap.filter(r=>r.area===area&&rmPersonMatch(r)&&rmSearchMatch(r));
      const head=document.createElement("div");head.className="areahead";head.innerHTML='<span class="dot" style="background:'+av.color+'"></span><span class="nm">'+esc(area)+'</span><span class="cat-count">'+items.length+'</span>';m.appendChild(head);
      appendTimeline(m,items,true);
    });
  }else if(rmTlMode==="person"){
    rmTimelineSwimlanes(m,groupByPerson(rmFilteredTargets()),"No assigned targets","Assign people to targets (Assign on a card) to see them grouped here.");
  }else if(rmTlMode==="status"){
    rmTimelineSwimlanes(m,rmStatusGroups(rmFilteredTargets()),"No targets to plot","Nothing matches the current filters.");
  }else if(rmTlMode==="phase"){
    rmTimelineSwimlanes(m,rmPhaseGroups(rmFilteredTargets()),"No targets to plot","Nothing matches the current filters.");
  }else{
    appendTimeline(m,rmFilteredTargets(),false);
  }
}
// Render one timeline frame per swimlane group ({name,color,items}); each gets a coloured header + its own dated frame.
// Shared by the By-person/By-status/By-phase layouts. Empty group set → a single empty-state notice.
function rmTimelineSwimlanes(m,groups,emptyTitle,emptyHint){
  if(!groups.length){m.insertAdjacentHTML("beforeend",'<div class="empty"><div class="big">'+esc(emptyTitle)+'</div>'+esc(emptyHint)+'</div>');return;}
  groups.forEach(g=>{
    const head=document.createElement("div");head.className="areahead";head.innerHTML='<span class="dot" style="background:'+g.color+'"></span><span class="nm">'+esc(g.name)+'</span><span class="cat-count">'+g.items.length+'</span>';m.appendChild(head);
    appendTimeline(m,g.items,true);
  });
}

async function planMeeting(){
  const ta=document.getElementById("planText");const txt=ta.value.trim();
  if(!txt){banner("Describe what the meeting is about first.","err");return;}
  const btn=document.getElementById("planBtn");btn.disabled=true;btn.innerHTML='<span class="spin"></span> Planning';
  try{
    const open=DB.roadmap.filter(r=>r.status!=="Done").map(r=>({id:r.id,title:r.title,area:r.area,phase:phaseOf(r),detail:r.detail||""}));
    const p='Plan a meeting from this request, choosing which existing roadmap items belong on the agenda and who should attend. '+
      'Roadmap items: '+JSON.stringify(open)+'. Team members: '+JSON.stringify(roster().map(m=>m.name))+'. '+
      'Reply with ONLY JSON: {"title": short meeting title, "roadmapIds": [ids of chosen items], "attendees": [names]}. '+EXTRACT_GUARD+'\nRequest:\n"""'+txt+'"""';
    const text=await callClaude(p);const res=extractJSON(text,"object");
    const ids=(res.roadmapIds||[]).filter(id=>DB.roadmap.some(r=>r.id===id));
    let att=(res.attendees||[]).filter(n=>member(n)).map(n=>member(n).name);
    if(!att.length){const s=new Set();DB.tasks.filter(t=>!t.trashed&&ids.includes(t.roadmapId)).forEach(t=>(t.assignees||[]).forEach(n=>{if(member(n))s.add(member(n).name);}));att=[...s];}
    const newId=await fbAdd("agendas",{title:res.title||"Meeting",date:today(),attendees:att,roadmapIds:ids,notes:"",createdBy:identity});
    ta.value="";banner("Agenda drafted with "+ids.length+" roadmap item"+(ids.length!==1?"s":"")+".","ok");
    createMeetForAgenda({id:newId,title:res.title||"Meeting",date:today(),attendees:att,roadmapIds:ids},true);
  }catch(e){banner("Could not plan the meeting ("+(e.message||"error")+"). Check AI_ENDPOINT, or retry.","err");console.error(e);}
  finally{btn.disabled=false;btn.textContent="Plan meeting";}
}

// Build/edit form for an agenda. a=null → create mode. onDone/onCancel are optional callbacks.

  const wrap=document.createElement("div");

  const TZ_LIST=["America/New_York","America/Chicago","America/Denver","America/Phoenix","America/Los_Angeles","America/Anchorage","Pacific/Honolulu","UTC","Europe/London","Europe/Paris","Europe/Berlin","Asia/Kolkata","Asia/Singapore","Asia/Tokyo","Australia/Sydney"];
  let browserTz="America/New_York";try{browserTz=Intl.DateTimeFormat().resolvedOptions().timeZone||browserTz;}catch(e){}
  const curTz=(a&&a.tz)||browserTz;
  const tzChoices=TZ_LIST.includes(curTz)?TZ_LIST:[curTz].concat(TZ_LIST);
  const tzOptions=tzChoices.map(z=>'<option value="'+esc(z)+'"'+(z===curTz?' selected':'')+'>'+esc(z)+'</option>').join("");
  wrap.innerHTML='<div class="field"><label>Meeting title</label><input class="ctrl" data-fld="title" placeholder="e.g. Cache rollout review"></div>'+

    '<div class="field"><label>Timezone</label><select class="ctrl" data-fld="tz">'+tzOptions+'</select></div>';
    // Attendees are now edited inline on the agenda card (People), not here.
  wrap.querySelector('[data-fld="title"]').value=a?a.title||"":"";
  wrap.querySelector('[data-fld="date"]').value=a?a.date||"":"";
  wrap.querySelector('[data-fld="time"]').value=a?a.time||"":"";

    const title=wrap.querySelector('[data-fld="title"]').value.trim();

        if((a.rsvps||[]).length&&(date!==a.date||time!==(a.time||"")||tz!==(a.tz||"")))patch.rsvps=[];
        await fbUpdate("agendas",a.id,patch);banner("Agenda updated."+(patch.rsvps?" RSVPs reset.":""),"ok");updateMeetForAgenda(Object.assign({},a,{title,date,time,tz}));}
      else{const newId=await fbAdd("agendas",{title,date,time,tz,attendees:[],roadmapIds:[],notes:"",createdBy:identity});banner("Agenda created.","ok");createMeetForAgenda({id:newId,title,date,time,tz,attendees:[],roadmapIds:[]},true);}
      if(onDone)onDone();
    }catch(e){banner(e.message,"err");}
  };
  btns.appendChild(save);
  if(onCancel){const c=document.createElement("button");c.className="btn sm";c.textContent="Cancel";c.onclick=onCancel;btns.appendChild(c);}
  wrap.appendChild(btns);
  return wrap;
}

function agendaSearchMatch(a){
  const q=agendaSearch.trim().toLowerCase();if(!q)return true;
  if((a.title||"").toLowerCase().includes(q))return true;
  if((a.notes||"").toLowerCase().includes(q))return true;
  if((a.attendees||[]).some(n=>(n||"").toLowerCase().includes(q)))return true;
  return (a.roadmapIds||[]).some(id=>{const r=DB.roadmap.find(x=>x.id===id);return r&&(r.title||"").toLowerCase().includes(q);});
}

const memberEmail=name=>{const mm=member(name);return mm&&mm.email?mm.email:"";};
// Who on an agenda has / lacks an email (so we can report who actually gets invited).
function attendeeEmailStats(a){
  const names=a.attendees||[];

}

// Build the body sent to /api/calendar from an agenda.
function meetPayload(a,extra){
  const emails=(a.attendees||[]).map(memberEmail).filter(Boolean);
  const items=(a.roadmapIds||[]).map(id=>DB.roadmap.find(r=>r.id===id)).filter(Boolean);
  const desc=(items.length?"Agenda:\n"+items.map(r=>"• "+r.title+(r.area?" ("+r.area+")":"")).join("\n"):"Planned in Gameplan HQ.")+"\n\nGameplan HQ";
  return Object.assign({title:a.title||"Meeting",date:a.date||today(),time:a.time||"",tz:a.tz||"",attendees:emails,description:desc},extra||{});

async function callMeet(payload){
  const r=await fetch(MEET_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  const data=await r.json().catch(()=>({}));
  if(r.status===501||data.needsSetup)throw new Error("Google Meet isn’t set up yet — add the Google OAuth env vars on Vercel and redeploy (see README).");
  if(!r.ok)throw new Error(typeof data.error==="string"?data.error:"calendar error "+r.status);
  return data;
}
// Pull this agenda's transcript from Fireflies (matched server-side by date + title) into its notes.
async function pullFireflies(a){
  try{
    const r=await fetch(FF_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title:a.title||"",date:a.date||"",meetLink:a.meetLink||""})});
    const data=await r.json().catch(()=>({}));
    if(r.status===501||data.needsSetup){banner("Fireflies isn’t set up yet — add FIREFLIES_API_KEY in Vercel and redeploy.","err");return;}
    if(data.authError){banner("Fireflies rejected the API key — check FIREFLIES_API_KEY in Vercel.","err");return;}
    if(!r.ok){banner(typeof data.error==="string"?data.error:"Fireflies error "+r.status,"err");return;}
    if(!data.found){banner(data.message||"No matching Fireflies transcript found.","err");return;}
    await fbUpdate("agendas",a.id,{notes:data.notes,notesDocUrl:data.transcriptUrl||"",notesPulledAt:today()});
    banner("Pulled transcript: "+(data.title||"meeting")+".","ok");
  }catch(e){banner(e.message,"err");}
}

async function createMeetForAgenda(a,quiet){

    const p='From these meeting notes, extract the concrete action steps as tasks for an internal task board. Only real, actionable follow-ups — skip discussion and recap. '+
      'Roadmap items discussed (set roadmapId to one when a task clearly relates, else null): '+JSON.stringify(items)+'. '+
      'Allowed categories: '+CATS.join(", ")+'. Allowed priorities: '+PRIORITIES.join(", ")+'. Team members: '+JSON.stringify(roster().map(m=>m.name))+'. '+
      'Reply with ONLY JSON: {"tasks":[{"title":"...","category":"...","priority":"...","assignees":["name"],"context":"one line of context","roadmapId":"id-or-null"}]}. '+EXTRACT_GUARD+'\nNotes:\n"""'+a.notes+'"""';

function renderProposedTasks(a,tasks,container){

    row.insertAdjacentHTML("beforeend",'<div class="cmeta" style="margin-top:4px;">'+esc(sub)+'</div>');

  });
  const create=document.createElement("button");create.className="btn primary sm";create.style.marginTop="8px";create.textContent="Create selected tasks";
  create.onclick=async()=>{
    const chosen=rows.filter(r=>r.cb.checked&&r.title.value.trim());

    create.disabled=true;create.innerHTML='<span class="spin"></span> Creating';

    let n=0,skip=0;
    for(const r of chosen){

      catch(e){banner(e.message,"err");}
    }

    container.innerHTML='<div class="cmeta">Created '+n+' task'+(n!==1?'s':'')+(skip?', skipped '+skip+' already on the board':'')+' — see the Tasks page.</div>';
  };
  container.appendChild(create);
}

// An "agent" is a structured spec drafted with Claude and stored in the `agents` collection. repoUrl/repoPath
// are captured now so Phase 2 (git sync of the spec as Markdown+frontmatter) has somewhere to write. No runtime yet.
const AGENT_TYPES=["connector","etl","analysis","automation","other"];
const AGENT_STATUSES=["draft","active","archived"];
const AGENT_MODELS=["claude-opus-4-8","claude-sonnet-4-6","claude-haiku-4-5-20251001"];
const agentsSorted=()=>DB.agents.slice().sort((a,b)=>(b.updatedAt||b.createdAt||"").localeCompare(a.updatedAt||a.createdAt||""));
// Stable, immutable identity for an agent, written into the spec frontmatter so a file's link to its local
// record survives a move/rename in the repo. Sync reconciles on agentId (not repoPath), so relocating a spec
// file in the repo no longer reads as a brand-new agent. Distinct from the Firestore doc id (which is per-store).
const agentUid=()=>{try{return crypto.randomUUID();}catch(e){return "ag-"+Date.now().toString(36)+Math.random().toString(36).slice(2,10);}};
// Folder paths the user has collapsed in the Agents directory tree (default = expanded; membership = collapsed).
const agentDiagramCollapsed=new Set(); // collapsed nodes in the Agents directory tree (default expanded; membership = collapsed)
// Staged folder moves not yet written to the repo: agent doc id → {folder, newPath}. Session-only (lost on
// refresh). The Agents header's "Commit moves" button writes them all to git; re-staging an agent back to its
// committed folder clears its entry (no delta). Kept separate from a.repoPath, which stays at the committed path.
const agentPendingMoves={};
let agentSearch=""; // free-text filter on the Agents page diagram; "" = off (matches name/type/summary)
// The path an agent should appear at in the tree: its staged destination if a move is pending, else its
// committed repoPath. Drives the directory tree and the move modal's prefill/collision checks.
function agentEffectivePath(a){const p=agentPendingMoves[a.id];return p?p.newPath:(a.repoPath||"");}
// Folder segments for an agent, derived from its repoPath (the spec file's location), with the file name
// dropped. "" repoPath → null = "unfiled" (not yet linked to a repo file). Segments are shown *relative to*
// the sync dir so the tree roots at the contents of .claude/agents/ rather than repeating ".claude › agents"
// on every node. Files outside the sync dir (e.g. a legacy "agents/x.md") keep their full path so they stay
// visible. e.g. ".claude/agents/connectors/stripe.md" → ["connectors"]; ".claude/agents/x.md" → [].
function agentDirSegments(a){
  let p=agentEffectivePath(a).replace(/^\/+/,"").replace(/\/+$/,""); // effective = staged dest if a move is pending
  if(!p)return null;
  if(p===SYNC_DIR||p.startsWith(SYNC_DIR+"/"))p=p.slice(SYNC_DIR.length).replace(/^\/+/,""); // make it relative to the sync dir
  const parts=p.split("/");parts.pop(); // drop the file name, keep the directories
  return parts.filter(Boolean);
}

// Turn a plain-language data-source/agent description into a structured spec (same callClaude→extractJSON path as Capture).
async function draftAgentSpec(desc){

    'Reply with ONLY JSON (no prose, no fences): '+
    '{"name":"short name","type":"one of: '+AGENT_TYPES.join(", ")+'","summary":"one paragraph","systemPrompt":"the system prompt defining the agent’s behaviour and method","tools":["toolName — what it does"],"inputs":"what it accepts","outputs":"what it emits","notes":"authentication patterns, pagination, rate-limit discovery, and other operational notes"}. '+

async function githubSync(payload){

// Load (and cache) the repos the GitHub App can sync to. Used by the editor's repo dropdown and the

async function loadGhRepos(force){

// Two-way sync of agent specs with a repo (auto-import + push/pull, last-write-wins by timestamp).
// Scans <repo>/agents/*.md: file with no local agent → import (create); both exist → newer of {git commit
// time, local updatedAt} wins (pull or push); local agent in this repo whose file is missing → push (create).
// Returns counts. Writes commits, so it's behind an explicit "Sync" button, not silent on load.
const SYNC_DIR=".claude/agents"; // folder convention scanned for agent spec files (Claude Code's subagent location)
async function syncRepoAgents(repoUrl){
  const norm=normRepo(repoUrl);
  const {files}=await githubSync({op:"listFiles",repoUrl,path:SYNC_DIR});
  const r={imported:0,pulled:0,pushed:0,skipped:0,errors:0};
  const localForRepo=DB.agents.filter(a=>normRepo(a.repoUrl)===norm&&a.repoPath);
  const handled=new Set(); // local agent ids reconciled below — kept out of the trailing "push missing" pass
  const specFields=s=>({name:s.name,type:s.type,status:s.status,model:s.model,summary:s.summary,systemPrompt:s.systemPrompt,tools:s.tools||[],inputs:s.inputs,outputs:s.outputs,notes:s.notes});
  // Auto-derive a 1-liner summary from the first non-empty line of the system prompt when the spec has none.
  const derivedSummary=s=>{if(s.summary)return s.summary;const p=String(s.systemPrompt||"").trim();if(!p)return "";return p.split(/\n+/).map(l=>l.replace(/^[#\s>*\-]+/,"").trim()).find(l=>l.length>4)||"";};
  for(const f of (files||[])){
    try{
      const res=await githubSync({op:"read",repoUrl,path:f.path});
      if(!res.found)continue;
      const repoTime=(res.lastCommit&&res.lastCommit.date)||"";
      // Match on the stable agentId first (survives a move/rename in the repo); fall back to repoPath for
      // legacy spec files written before agentId existed.
      const local=(res.spec.agentId&&localForRepo.find(a=>a.agentId===res.spec.agentId))||localForRepo.find(a=>a.repoPath===f.path);
      if(!local){
        await fbAdd("agents",Object.assign(specFields(res.spec),{summary:derivedSummary(res.spec),repoUrl,repoPath:f.path,agentId:res.spec.agentId||agentUid(),lastCommitSha:res.sha||"",lastSyncedAt:today(),
          createdBy:res.spec.createdBy||identity,createdAt:res.spec.createdAt||today(),updatedAt:repoTime||nowTs()}));
        r.imported++;
      }else{
        handled.add(local.id);
        const localTime=local.updatedAt||"";
        const moved=local.repoPath!==f.path; // file relocated in the repo since we last saw it
        if(repoTime>localTime){ await fbUpdate("agents",local.id,Object.assign(specFields(res.spec),{repoPath:f.path,agentId:local.agentId||res.spec.agentId||"",lastCommitSha:res.sha||"",lastSyncedAt:today(),updatedAt:repoTime})); r.pulled++; }
        else if(localTime>repoTime){ const aid=local.agentId||res.spec.agentId||agentUid(); const wr=await githubSync({op:"write",repoUrl,path:f.path,spec:Object.assign({},local,{repoUrl,repoPath:f.path,agentId:aid})}); await fbUpdate("agents",local.id,{repoPath:f.path,agentId:aid,lastCommitSha:(wr.sha)||"",lastSyncedAt:today()}); r.pushed++; }
        else if(moved){ await fbUpdate("agents",local.id,{repoPath:f.path,lastSyncedAt:today()}); r.pulled++; } // pure relocation, content unchanged
        else r.skipped++;
      }
    }catch(e){r.errors++;}
  }
  // Local agents linked to this repo whose file isn't there yet → push (create the file). Skip ones already
  // reconciled above (their file exists, possibly under a different path) so we don't recreate it at a stale path.
  for(const a of localForRepo){
    if(handled.has(a.id))continue;
    try{ const aid=a.agentId||agentUid(); const wr=await githubSync({op:"write",repoUrl,path:a.repoPath,spec:Object.assign({},a,{agentId:aid})}); await fbUpdate("agents",a.id,{agentId:aid,lastCommitSha:(wr.sha)||"",lastSyncedAt:today()}); r.pushed++; }
    catch(e){r.errors++;}
  }

}
// Resync every repo that matters — all connected GitHub App repos plus any repo referenced by an existing
// agent — deduped by normRepo. Aggregates per-repo counts. Powers the Agents page "Resync" button so the user
// can import/reconcile without going to Settings. Returns {repos,imported,pulled,pushed,skipped,errors}.
async function resyncAllAgents(){
  await loadGhRepos();
  const byRepo=new Map();
  (ghRepos||[]).forEach(r=>{if(r.url)byRepo.set(normRepo(r.url),r.url);});
  DB.agents.forEach(a=>{if(a.repoUrl&&!byRepo.has(normRepo(a.repoUrl)))byRepo.set(normRepo(a.repoUrl),a.repoUrl);});
  const tot={repos:0,imported:0,pulled:0,pushed:0,skipped:0,errors:0};
  for(const url of byRepo.values()){
    try{const c=await syncRepoAgents(url);tot.repos++;tot.imported+=c.imported;tot.pulled+=c.pulled;tot.pushed+=c.pushed;tot.skipped+=c.skipped;tot.errors+=c.errors;}

// Move an agent's spec file to a different folder in its repo, keeping the file name. destFolderRaw is a folder
// path; bare/relative entries are taken as living under agents/ (SYNC_DIR). Persists the move to the repo as
// write-new-then-delete-old — the new file is confirmed written before the old one is removed, so an interruption
// leaves a recoverable duplicate rather than a lost agent. Returns {ok,msg}; never deletes on a failed write.
// Resolve + validate a destination WITHOUT touching the repo. Returns {ok:false,msg} on rejection, else
// {ok:true,folder,newPath,filename} with the resolved absolute repo folder + full path. Validation is local
// only (format, no-op, collisions vs *effective* paths) so it can run at stage time; the repo-side clobber
// guard stays in moveAgent (commit time). Collisions use effective paths so two staged moves can't share a path.
function resolveMove(a,destFolderRaw,opts){
  opts=opts||{};
  if(!a.repoUrl||!a.repoPath)return{ok:false,msg:"Link this agent to a repo and path first (Edit)."};
  let folder=String(destFolderRaw||"").trim().replace(/\\/g,"/").replace(/^\/+|\/+$/g,"").replace(/\/+/g,"/");
  // opts.absolute: folder is the exact repo path of a target folder (e.g. from a drag-drop onto a tree node).
  // Otherwise it's a relative entry taken as living under the sync dir (the typed move modal).
  if(!opts.absolute){ if(folder&&folder!==SYNC_DIR&&!folder.startsWith(SYNC_DIR+"/"))folder=SYNC_DIR+"/"+folder; if(!folder)folder=SYNC_DIR; }
  const segs=folder.split("/");
  if(!folder||segs.some(s=>!s||s==="."||s===".."))return{ok:false,msg:"Invalid destination folder."};
  const filename=a.repoPath.split("/").pop();
  const newPath=folder+"/"+filename;
  if(DB.agents.some(x=>x.id!==a.id&&normRepo(x.repoUrl)===normRepo(a.repoUrl)&&agentEffectivePath(x)===newPath))
    return{ok:false,msg:"Another agent already lives at (or is staged for) that path."};
  return{ok:true,folder,newPath,filename};
}
// Stage a folder move locally (no repo write) and re-render. Moving an agent back to its committed folder
// clears its pending entry. Commit the whole batch via the Agents header's "Commit moves" button.
function stageMove(a,destFolderRaw,opts){
  const r=resolveMove(a,destFolderRaw,opts);
  if(!r.ok)return r;
  if(r.newPath===(a.repoPath||"")){ delete agentPendingMoves[a.id]; renderAgents(); return{ok:true,msg:"Back in its committed folder — move unstaged."}; }
  agentPendingMoves[a.id]={folder:r.folder,newPath:r.newPath};
  renderAgents();
  return{ok:true,msg:"Staged move to "+r.folder+" — click “Commit moves” to write it to the repo."};
}
// Commit every staged move to the repo (write the new file + remove the old, per move). Successful moves are
// dropped from the pending set; failures stay staged and are reported.
async function commitPendingMoves(btn){
  const ids=Object.keys(agentPendingMoves);
  if(!ids.length)return;
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Committing';}
  let ok=0,fail=0,lastErr="";
  for(const id of ids){
    const a=DB.agents.find(x=>x.id===id);
    if(!a){delete agentPendingMoves[id];continue;} // agent gone — drop the stale staging
    try{const r=await moveAgent(a,agentPendingMoves[id].folder,{absolute:true});
      if(r.ok){delete agentPendingMoves[id];ok++;}else{fail++;lastErr=r.msg;}
    }catch(e){fail++;lastErr=e.message;}
  }
  banner(ok+" move"+(ok!==1?"s":"")+" committed"+(fail?" · "+fail+" failed: "+lastErr:"."),fail?"err":"ok");
  renderAgents();
}
async function moveAgent(a,destFolderRaw,opts){
  const r=resolveMove(a,destFolderRaw,opts);
  if(!r.ok)return r;
  const {folder,newPath,filename}=r;
  if(newPath===a.repoPath)return{ok:false,msg:"Already in that folder."};
  const aid=a.agentId||agentUid();
  // Guard against clobbering a *different* agent's file that already exists at the target path in the repo.
  try{const ex=await githubSync({op:"read",repoUrl:a.repoUrl,path:newPath});
    if(ex.found&&ex.spec&&ex.spec.agentId&&ex.spec.agentId!==aid)return{ok:false,msg:"A different agent's file already exists at that path in the repo."};
  }catch(e){/* a read failure shouldn't block the move; the write below surfaces real errors */}
  const ts=nowTs();
  const spec=Object.assign({},a,{repoUrl:a.repoUrl,repoPath:newPath,agentId:aid,updatedAt:ts});
  const wr=await githubSync({op:"write",repoUrl:a.repoUrl,path:newPath,spec,message:"Move agent "+(a.name||filename)+" → "+newPath});
  // New file is written; now remove the old one. Best-effort — if it fails the agent already lives at newPath.
  let delMsg="";
  try{await githubSync({op:"delete",repoUrl:a.repoUrl,path:a.repoPath,message:"Move agent "+(a.name||filename)+": remove old "+a.repoPath});}
  catch(e){delMsg=" (old file not removed — delete it manually: "+a.repoPath+")";}
  await fbUpdate("agents",a.id,{repoPath:newPath,agentId:aid,lastCommitSha:wr.sha||(wr.commit&&wr.commit.sha)||"",lastSyncedAt:today(),updatedAt:ts});
  return{ok:true,msg:"Moved to "+folder+delMsg};
}

// ---- Markdown rendering (agent .md view) --------------------------------------------------------------------
// Minimal, XSS-safe Markdown → HTML. Every line is HTML-escaped (reusing esc()) BEFORE any formatting runs, so
// raw HTML/<script> in a spec is rendered inert; only the small tag set below is ever emitted. Link hrefs are
// scheme-checked (mdSafeUrl) so javascript:/data: URLs degrade to plain text.
function mdSafeUrl(u){
  const s=(u||"").replace(/&amp;/g,"&").trim();
  if(/^(https?:\/\/|mailto:|\/|\.\/|\.\.\/|#)/i.test(s))return true; // explicitly allowed
  return !/^[a-z][a-z0-9+.\-]*:/i.test(s);                           // any bare path with no scheme is safe
}
// Inline formatting over an already-escaped string: code spans, bold, italic, links.
function mdInline(s){
  const codes=[];
  s=s.replace(/`([^`]+)`/g,(m,c)=>{codes.push(c);return "␀"+(codes.length-1)+"␀";}); // protect code spans
  s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s=s.replace(/\b_([^_]+)_\b/g,"<em>$1</em>");           // _emphasis_ but not snake_case
  s=s.replace(/(^|[^*])\*([^*]+)\*/g,"$1<em>$2</em>");
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(m,t,u)=>mdSafeUrl(u)?'<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>':t);
  return s.replace(/␀(\d+)␀/g,(m,i)=>"<code>"+codes[+i]+"</code>");

function mdToHtml(src){
  const lines=String(src||"").replace(/\r\n?/g,"\n").split("\n");
  const out=[];let i=0;const para=[];let list=null;
  const flushPara=()=>{if(para.length){out.push("<p>"+para.map(l=>mdInline(esc(l))).join("<br>")+"</p>");para.length=0;}};
  const flushList=()=>{if(list){out.push("<"+list.type+">"+list.items.map(it=>"<li>"+mdInline(esc(it))+"</li>").join("")+"</"+list.type+">");list=null;}};
  while(i<lines.length){
    const line=lines[i];
    if(/^\s*```/.test(line)){flushPara();flushList();const buf=[];i++;while(i<lines.length&&!/^\s*```/.test(lines[i])){buf.push(lines[i]);i++;}i++;out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>");continue;}
    if(/^\s*$/.test(line)){flushPara();flushList();i++;continue;}
    const h=line.match(/^(#{1,6})\s+(.*)$/);
    if(h){flushPara();flushList();const lvl=Math.min(h[1].length,3);out.push("<h"+lvl+">"+mdInline(esc(h[2].trim()))+"</h"+lvl+">");i++;continue;}
    if(/^\s*(---|\*\*\*|___)\s*$/.test(line)){flushPara();flushList();out.push("<hr>");i++;continue;}
    const bq=line.match(/^\s*>\s?(.*)$/);
    if(bq){flushPara();flushList();const buf=[bq[1]];i++;while(i<lines.length){const mm=lines[i].match(/^\s*>\s?(.*)$/);if(!mm)break;buf.push(mm[1]);i++;}out.push("<blockquote>"+buf.map(l=>mdInline(esc(l))).join("<br>")+"</blockquote>");continue;}
    const ul=line.match(/^\s*[-*+]\s+(.*)$/),ol=line.match(/^\s*\d+[.)]\s+(.*)$/);
    if(ul||ol){flushPara();const type=ul?"ul":"ol";if(!list||list.type!==type){flushList();list={type,items:[]};}list.items.push(ul?ul[1]:ol[1]);i++;continue;}
    flushList();para.push(line);i++;
  }
  flushPara();flushList();
  return out.join("\n")||'<p class="mdv-empty">This file is empty.</p>';
}
// Reconstruct the agent's Markdown body (mirrors api/github.js serializeSpec) from the in-app spec, skipping
// empty sections so the rendered view stays clean.
function agentSpecToMarkdown(a){
  const parts=["# "+(a.name||"Untitled agent")];
  if(a.summary&&a.summary.trim())parts.push("",a.summary);
  const sec=(h,v)=>{if(v&&String(v).trim())parts.push("","## "+h,"",String(v));};

// "owner/repo" label from a github URL (the diagram's top-level repo nodes).

// Build the repo → folder → agent hierarchy for the directory diagram. Leaves carry .agent; containers carry
// .children (sub-folders) + .agents (direct leaves). Folders come from agentDirSegments (relative to the sync
// dir); agents with no repoUrl land under a synthetic "Unfiled" repo.
function buildAgentHierarchy(){
  const root={label:"agents",children:new Map(),agents:[]};
  const q=agentSearch.trim().toLowerCase();
  const list=q?DB.agents.filter(a=>(a.name||"").toLowerCase().includes(q)||(a.type||"").toLowerCase().includes(q)||(a.summary||"").toLowerCase().includes(q)):null;

    let node=root.children.get(repoKey);
    // Full repo path (NOT trimmed to the sync dir) so the tree mirrors exactly where the agent lives in the repo.
    const full=agentEffectivePath(a).replace(/^\/+/,"").replace(/\/+$/,""); // staged dest if a move is pending
    const dirs=full?full.split("/").slice(0,-1):[]; // drop the file name, keep every directory from the repo root
    let acc="";

}
function tmLeafCount(node){if(node.agent)return 1;let n=node.agents?node.agents.length:0;if(node.children)node.children.forEach(c=>n+=tmLeafCount(c));return n;}
const AGENT_TYPE_COLORS={connector:"#4646c8",etl:"#1d6b45",analysis:"#b4690e",automation:"#9333ea",other:"#646b78"};
// A small colored dot indicating an agent's type — just a scan aid in the diagram.
function agentTypeDot(type){const c=AGENT_TYPE_COLORS[type]||AGENT_TYPE_COLORS.other;return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c+';flex:none;"></span>';}
// Colored icon badge for a repo node: uses the repo's Settings color + first char of its friendly name (or 📦 if no color set).
function repoNodeIconHtml(repoUrl,fallbackLabel){const c=repoColor(repoUrl);const fn=repoFriendly(repoUrl);const ch=fn?fn[0].toUpperCase():(fallbackLabel?fallbackLabel[0].toUpperCase():"R");if(!c)return '📦';return '<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:'+c+';color:#fff;font-size:10px;font-weight:700;flex:none;vertical-align:middle;line-height:1;">'+esc(ch)+'</span>';}
// Directory diagram: an indented node tree of the repo → folder → agent hierarchy with vertical guide lines.
// Repo/folder nodes are collapsible (state in agentDiagramCollapsed); clicking an agent node opens its menu.
function renderAgentsDiagram(m){
  const root=buildAgentHierarchy();
  const byLabel=(x,y)=>(x.label||"").toLowerCase().localeCompare((y.label||"").toLowerCase());
  // A container node's children: sub-folders (alphabetical) first, then its own agents (by name) as leaves.
  const kidsOf=node=>{
    const folders=Array.from((node.children||new Map()).values()).sort(byLabel);
    const agents=(node.agents||[]).slice().sort((a,b)=>(a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase())).map(a=>({label:a.name||"Untitled",agent:a}));
    return folders.concat(agents);
  };
  const renderNode=(node,key,icon,parentEl)=>{
    if(node.agent){
      const ag=node.agent;const pend=agentPendingMoves[ag.id];
      const row=document.createElement("div");row.className="trow tagent";
      const tc=AGENT_TYPE_COLORS[ag.type]||AGENT_TYPE_COLORS.other;
      row.innerHTML='<span class="tchev">•</span>'+agentTypeDot(ag.type)+'<span>'+esc(node.label)+'</span>'+
        (ag.type?'<span class="chip" style="margin-left:2px;background:'+tc+'22;color:'+tc+';border:1px solid '+tc+'44;">'+esc(ag.type)+'</span>':'')+
        (pend?'<span class="chip" style="margin-left:4px;background:var(--accent-soft,#e8e8fb);color:var(--accent,#4646c8);">moved · pending</span>':'')+
        '<span class="tspacer"></span>';
      // Description icon: DOM element so .title is set safely (esc() doesn't escape double-quotes in attributes).
      if(ag.summary){const info=document.createElement("span");info.style.cssText="display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--soft,#f0f0ee);color:var(--muted,#888);font-size:10px;flex:none;cursor:default;margin-left:3px;font-style:italic;font-weight:700;";info.textContent="i";info.title=ag.summary;const ref=row.querySelector(".chip")||row.querySelector(".tspacer");if(ref)row.insertBefore(info,ref);else row.appendChild(info);}
      row.title=(ag.name||"Untitled")+(ag.summary?" — "+ag.summary:"")+(ag.repoPath?"\n"+ag.repoPath:"")+(pend?"  (staged move — not yet committed)":(ag.repoUrl&&ag.repoPath?"  (drag onto a folder to move)":""));
      row.onclick=()=>agentMenuModal(ag);
      // Inline display button: render the formatted agent file directly, skipping the action menu.
      const viewBtn=document.createElement("button");viewBtn.type="button";viewBtn.className="tview";
      viewBtn.textContent="📄 View";viewBtn.title="View formatted file";viewBtn.setAttribute("aria-label","View formatted agent file");
      viewBtn.onclick=e=>{e.stopPropagation();agentViewModal(ag);};
      row.appendChild(viewBtn);
      // Drag to move: only filed agents (have a repo + path) can be relocated.
      if(ag.repoUrl&&ag.repoPath){
        row.draggable=true;
        row.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/agent-id",ag.id);e.dataTransfer.effectAllowed="move";row.classList.add("tdrag");});
        row.addEventListener("dragend",()=>row.classList.remove("tdrag"));
      }
      parentEl.appendChild(row);return;
    }
    const collapsed=agentDiagramCollapsed.has(key);
    const row=document.createElement("div");row.className="trow tcont";
    row.title=collapsed?"Click to expand":"Click to collapse";
    // Top-level repo nodes (no fullPath) get a color-coded icon and subtle border from Settings.
    const isRepo=!node.fullPath&&node.repoUrl&&node.repoUrl!=="";
    const dispIcon=isRepo?repoNodeIconHtml(node.repoUrl,node.label):icon;
    const rColor=isRepo?repoColor(node.repoUrl):"";
    if(rColor)row.style.cssText="border-left:3px solid "+rColor+";padding-left:6px;";
    row.innerHTML='<span class="tchev">'+(collapsed?"▸":"▾")+'</span><span>'+dispIcon+'</span><span class="nm" style="font-size:13px;">'+esc(node.label)+'</span><span class="tcount">'+tmLeafCount(node)+'</span>';
    row.onclick=()=>{collapsed?agentDiagramCollapsed.delete(key):agentDiagramCollapsed.add(key);renderAgents();};
    // Folder nodes (those with a concrete repo path) are drop targets — dropping an agent moves its file here.
    if(node.fullPath!==undefined){
      row.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";row.classList.add("tdrop");});
      row.addEventListener("dragleave",()=>row.classList.remove("tdrop"));
      row.addEventListener("drop",e=>{
        e.preventDefault();row.classList.remove("tdrop");
        const id=e.dataTransfer.getData("text/agent-id");const ag=DB.agents.find(x=>x.id===id);if(!ag)return;
        if(normRepo(ag.repoUrl)!==normRepo(node.repoUrl)){banner("Drag-move works within one repo. Use the agent menu’s “Move” for other moves.","err");return;}
        const r=stageMove(ag,node.fullPath,{absolute:true});banner(r.msg,r.ok?"ok":"err");
      });
    }
    parentEl.appendChild(row);
    if(collapsed)return;
    const kw=document.createElement("div");kw.className="tkids";
    kidsOf(node).forEach(c=>renderNode(c,key+"/"+(c.agent?"a:"+c.agent.id:c.label),"📁",kw));
    parentEl.appendChild(kw);
  };
  const wrap=document.createElement("div");wrap.style.marginTop="6px";
  Array.from(root.children.entries()).sort((a,b)=>(a[1].label||"").toLowerCase().localeCompare((b[1].label||"").toLowerCase()))
    .forEach(([rk,node])=>renderNode(node,"repo:"+rk,node.label==="Unfiled"?"🗂":"📦",wrap));
  m.appendChild(wrap);
  m.insertAdjacentHTML("beforeend",'<p class="hint" style="margin-top:8px;">Full repo directory: repo → folders → agent. Click a folder to collapse it, click an agent to open its menu, click <b>📄 View</b> to read its formatted file, or drag an agent onto a folder to <b>stage</b> a move — then click “Commit moves” to write staged moves to the repo. Staged moves are cleared if you refresh before committing.</p>');
}
function renderAgents(m){
  m=m||document.getElementById("main");m.innerHTML="";
  m.insertAdjacentHTML("beforeend",'<div class="pagehead">Agents</div><p class="pagesub">AI agents authored with Claude and saved to the board. Organized into folders mirroring each repo’s layout — an agent’s folder follows its repo path, so changes sync back to the repo.</p>');
  const head=document.createElement("div");head.className="areahead";
  head.innerHTML='<span class="nm">Your agents</span><span class="cat-count">'+DB.agents.length+'</span>';
  // Resync: import/reconcile agents from every connected repo's .claude/agents/ (no need to visit Settings).
  const resync=document.createElement("button");resync.className="btn sm";resync.textContent="⇄ Resync";
  resync.title="Import and reconcile agents from all connected repos ("+SYNC_DIR+"/)";
  resync.onclick=async()=>{
    resync.disabled=true;resync.innerHTML='<span class="spin"></span> Syncing';
    try{const c=await resyncAllAgents();
      if(!c.repos)banner("No connected repos to sync — install the GitHub App on a repo in Settings.","err");
      else banner("Resynced "+c.repos+" repo"+(c.repos!==1?"s":"")+": "+c.imported+" imported, "+c.pulled+" pulled, "+c.pushed+" pushed"+(c.skipped?", "+c.skipped+" unchanged":"")+(c.errors?", "+c.errors+" errors":"")+".",c.errors?"err":"ok");
    }catch(e){banner(e.message,"err");}
    resync.disabled=false;resync.innerHTML="⇄ Resync";renderAgents();
  };
  const add=document.createElement("button");add.className="btn sm";add.style.marginLeft="6px";add.textContent="+ New agent";add.onclick=()=>agentModal(null);
  // "Commit moves (N)" appears only when there are staged folder moves (a delta vs the repo); it writes them all
  // to git. "Discard" drops the staging without any repo change. With no delta the header just shows Resync + New.
  const pendN=Object.keys(agentPendingMoves).length;
  if(pendN){
    const commit=document.createElement("button");commit.className="btn sm primary";commit.style.marginLeft="auto";commit.textContent="Commit moves ("+pendN+")";commit.title="Write "+pendN+" staged folder move"+(pendN!==1?"s":"")+" to the repo";commit.onclick=()=>commitPendingMoves(commit);
    const disc=document.createElement("button");disc.className="btn sm";disc.style.marginLeft="6px";disc.textContent="Discard";disc.title="Discard staged moves (no repo changes)";disc.onclick=()=>{Object.keys(agentPendingMoves).forEach(k=>delete agentPendingMoves[k]);renderAgents();};
    head.append(commit,disc,resync,add);
  }else{
    resync.style.marginLeft="auto";head.append(resync,add);
  }
  m.appendChild(head);
  // Search bar — preserves focus + caret across per-keystroke re-renders.
  const _agSe=document.getElementById(“agentPageSearch”);const _agRefocus=!!(_agSe&&document.activeElement===_agSe);const _agCaret=_agRefocus?(_agSe.selectionStart??_agSe.value.length):0;
  const agbar=document.createElement(“div”);agbar.style.cssText=”display:flex;gap:8px;align-items:center;margin:8px 0 4px;”;
  const agS=document.createElement(“input”);agS.type=”search”;agS.className=”ctrl”;agS.id=”agentPageSearch”;agS.placeholder=”Search agents…”;agS.value=agentSearch;agS.style.cssText=”flex:1;min-width:160px;max-width:320px;”;
  agS.oninput=()=>{agentSearch=agS.value;renderAgents();};
  agbar.appendChild(agS);m.appendChild(agbar);
  if(_agRefocus){agS.focus();try{agS.setSelectionRange(_agCaret,_agCaret);}catch(_){}}
  if(!DB.agents.length){m.insertAdjacentHTML(“beforeend”,'<div class=”empty”><div class=”big”>No agents yet</div>Click “+ New agent” to draft one with Claude.</div>');return;}
  renderAgentsDiagram(m);
}
function renderSignIn(msg){
  document.getElementById("tabs").style.display="none";
  document.querySelector(".hctrl").style.display="none";
  document.getElementById("setupwarn").className="setupwarn";
  const m=document.getElementById("main");
  m.innerHTML='<div class="hero" style="max-width:420px;margin:48px auto;text-align:center;">'+
    '<h2 style="font-size:20px;">Sign in to Gameplan HQ</h2>'+
    '<p style="margin:6px auto 16px;">Use your <b>@'+ALLOWED_DOMAIN+'</b> Google account.</p>'+
    (msg?'<div class="banner err show" style="margin:0 0 14px;text-align:left;">'+esc(msg)+'</div>':'')+
    '<button class="btn primary" id="signinBtn">Sign in with Google</button></div>';
  document.getElementById("signinBtn").onclick=doSignIn;
}
async function doSignIn(){
  try{
    const provider=new GoogleAuthProvider();
    if(ALLOWED_DOMAIN)provider.setCustomParameters({hd:ALLOWED_DOMAIN});
    await signInWithPopup(auth,provider);
  }catch(e){renderSignIn("Sign-in failed: "+(e.message||e.code||"error"));}
}
function allowed(user){
  if(!user||!user.email)return false;
  if(!ALLOWED_DOMAIN)return true; // signed-in is enough (swap in an email allowlist here)
  return user.email.toLowerCase().endsWith("@"+ALLOWED_DOMAIN);
}
function startApp(user){
  document.getElementById("tabs").style.display="";
  document.querySelector(".hctrl").style.display="";
  showUserChip(user);
  resolveIdentity(user);   // bind "You are" to the login (re-resolved once the roster loads, in subscribeAll)
  refreshIdentity();
  if(identityUnknown)banner("Your login ("+user.email+") isn't on the roster — actions are tagged to your account name. Add your @"+ALLOWED_DOMAIN+" email to the team roster to fix attribution.","err");
  render();
  if(fbReady&&!subscribed){subscribed=true;subscribeAll();}
}

/* ---------- Init ---------- */
function init(){
  // Identity is bound to the authenticated user (see resolveIdentity), not chosen here.
  // Drop any stale manually-saved pick so it can't override the real login.
  try{localStorage.removeItem("gp_identity");}catch(e){}
  refreshIdentity();
  document.querySelectorAll("#tabs button").forEach(b=>{b.onclick=()=>setPage(b.dataset.page);});
  {const sb=document.getElementById("syncBtn");if(sb)sb.onclick=resyncNow;}
  // Restore the last-visited page across refreshes (falls back to the default for unknown/blocked storage).
  try{const sp=localStorage.getItem("gp_page");if(sp&&["capture","tasks","roadmap","agendas","agents","team"].includes(sp))page=sp;}catch(e){}
  restoreTaskState(); // restore the Tasks-tab filters/view/sort/column-filters the user last had
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.page===page));
  document.addEventListener("click",e=>{if(!e.target.closest(".dots-wrap"))document.querySelectorAll(".dots-drop.open").forEach(d=>d.classList.remove("open"));});

  if(!fbReady){
    const warn=document.getElementById("setupwarn");
    warn.className="setupwarn show";warn.textContent="Firebase isn’t configured yet — paste your firebaseConfig into the top of the script. Until then, data won’t save or sync.";
    render();
    return;
  }
  onAuthStateChanged(auth,user=>{
    if(allowed(user)){
      startApp(user);
    }else if(user){
      pendingAuthMsg=(user.email||"That account")+" is not a @"+ALLOWED_DOMAIN+" account — sign in with your company Google login.";
      signOut(auth);
    }else{
      renderSignIn(pendingAuthMsg);pendingAuthMsg="";
    }
  });
}
init();
</script>
